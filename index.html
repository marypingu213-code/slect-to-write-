<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作文小幫手 - 智慧導引寫作系統</title>
    <!-- 使用 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 使用 Lucide 圖示庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f4f8;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .recording-pulse {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 螢幕顯示時隱藏列印區域 */
        #print-area {
            display: none;
        }

        /* 列印專用樣式 - 橫向紙張、直排書寫 */
        @media print {
            body > *:not(#print-area) {
                display: none !important;
            }
            #print-area {
                display: block !important;
                writing-mode: vertical-rl;
                text-orientation: mixed;
                font-family: 'Noto Serif TC', serif;
                font-size: 24pt;
                line-height: 2;
                letter-spacing: 0.15em;
                padding: 1.5cm;
                width: 100vw;
                height: 100vh;
                background-color: white !important;
                color: black !important;
                white-space: pre-wrap;
            }
            @page {
                size: A4 landscape;
                margin: 0;
            }
        }

        .loading-spin {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .custom-modal {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="text-slate-900 selection:bg-purple-100">

    <!-- 列印專用的隱藏容器 -->
    <div id="print-area"></div>

    <div class="min-h-screen p-4 md:p-8 relative">
        <!-- 右上方設定按鈕 -->
        <button onclick="openSettings()" class="fixed top-4 right-4 z-40 p-3 bg-white text-slate-400 hover:text-purple-600 rounded-2xl shadow-sm border border-slate-100 transition-all hover:rotate-90 no-print">
            <i data-lucide="settings" class="w-6 h-6"></i>
        </button>

        <div class="max-w-6xl mx-auto">
            
            <!-- Header 區塊 -->
            <header class="mb-8 text-center fade-in no-print">
                <div class="inline-flex items-center justify-center p-4 bg-white text-purple-600 rounded-3xl mb-4 shadow-sm border border-slate-100">
                    <i data-lucide="sparkles" class="w-10 h-10"></i>
                </div>
                <h1 class="text-4xl font-black text-slate-800 mb-4 tracking-tight">作文小幫手</h1>
                
                <div class="flex flex-wrap justify-center gap-2 mb-2">
                    <span class="text-slate-400 font-bold self-center mr-2">題目路徑：</span>
                    <div id="topic-selector" class="inline-flex bg-white p-1 rounded-2xl shadow-sm border border-slate-100">
                        <!-- 由 JS 動態生成按鈕 -->
                    </div>
                </div>
            </header>

            <!-- 進度指示器 -->
            <div id="progress-container" class="mb-12 px-2 fade-in max-w-4xl mx-auto no-print">
                <div class="flex justify-between mb-4 relative" id="progress-dots">
                    <div class="absolute top-1/2 left-0 right-0 h-0.5 bg-slate-200 -translate-y-1/2 -z-10 mx-4"></div>
                </div>
                <div class="h-1.5 bg-slate-200 rounded-full overflow-hidden shadow-inner">
                    <div id="progress-bar" class="h-full bg-purple-600 transition-all duration-700 ease-out" style="width: 0%"></div>
                </div>
            </div>

            <!-- 主要內容區塊 -->
            <div id="main-card" class="bg-white rounded-[2.5rem] shadow-2xl shadow-purple-200/30 p-6 md:p-10 border border-white min-h-[500px] flex flex-col transition-all duration-500">
                <!-- 內容由 JS 注入 -->
            </div>

            <footer class="mt-12 text-center text-slate-400 text-sm font-medium border-t border-slate-200 pt-8 no-print">
                <p>© 2024 互動式教育工具集 | 讓每個孩子都能大聲說出好作文</p>
            </footer>
        </div>
    </div>

    <!-- API 設定彈窗 -->
    <div id="settings-modal" class="hidden fixed inset-0 z-50 custom-modal flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] shadow-2xl max-w-md w-full p-8 fade-in">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-slate-800">API 安全設定</h3>
                <button onclick="closeSettings()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
            </div>
            <p class="text-sm text-slate-500 mb-6">為了保護隱私，請填寫您的 Google AI API Key。此資訊僅儲存在本瀏覽器中，不會上傳到雲端。</p>
            <div class="mb-6">
                <label class="block text-sm font-bold text-slate-700 mb-2">Google AI API Key</label>
                <div class="relative">
                    <input type="password" id="api-key-input" placeholder="貼上您的 API Key" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition-all outline-none">
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="saveApiKey()" class="flex-1 py-3 bg-purple-600 text-white rounded-xl font-bold shadow-lg shadow-purple-100 hover:bg-purple-700 transition-all">儲存設定</button>
                <button onclick="clearApiKey()" class="py-3 px-6 bg-slate-100 text-slate-500 rounded-xl font-bold hover:bg-slate-200 transition-all">清除</button>
            </div>
        </div>
    </div>

    <!-- AI 調整建議彈窗 -->
    <div id="ai-modal" class="hidden fixed inset-0 z-50 custom-modal flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] shadow-2xl max-w-4xl w-full p-8 fade-in">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-purple-100 rounded-xl text-purple-600">
                        <i data-lucide="sparkles" class="w-5 h-5"></i>
                    </div>
                    <h3 class="text-2xl font-bold text-slate-800">老師幫你調整好了！你比較喜歡哪一個？</h3>
                </div>
                <button onclick="closeAI()" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <i data-lucide="x"></i>
                </button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="flex flex-col border-2 border-indigo-50 bg-indigo-50/20 rounded-3xl p-6 hover:border-indigo-300 transition-all group">
                    <span class="text-indigo-600 font-bold text-sm mb-2 block">版本一：溫馨抒情風</span>
                    <div id="ai-v1" class="text-slate-700 font-serif leading-relaxed mb-6 h-48 overflow-y-auto pr-2">正在處理中...</div>
                    <button onclick="applyAI('v1')" class="mt-auto py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">選擇這個版本</button>
                </div>
                <div class="flex flex-col border-2 border-purple-50 bg-purple-50/20 rounded-3xl p-6 hover:border-purple-300 transition-all group">
                    <span class="text-purple-600 font-bold text-sm mb-2 block">版本二：童趣生動風</span>
                    <div id="ai-v2" class="text-slate-700 font-serif leading-relaxed mb-6 h-48 overflow-y-auto pr-2">正在處理中...</div>
                    <button onclick="applyAI('v2')" class="mt-auto py-3 bg-purple-600 text-white rounded-xl font-bold shadow-lg shadow-purple-100 hover:bg-purple-700 transition-all">選擇這個版本</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 狀態管理 ---
        let currentTopic = 'timemachine';
        let currentStep = 0;
        let selections = { q1: '', q2: '', q3: '', q4: '' };
        let currentAIRustResults = { v1: '', v2: '' };
        let isRecording = false;
        let isRefining = false;
        let recognition = null;
        let textBeforeCurrentRecording = '';

        // --- API Key 管理 (安全機制) ---
        function getStoredApiKey() {
            return localStorage.getItem('google_ai_api_key') || '';
        }

        function openSettings() {
            document.getElementById('api-key-input').value = getStoredApiKey();
            document.getElementById('settings-modal').classList.remove('hidden');
        }

        function closeSettings() {
            document.getElementById('settings-modal').classList.add('hidden');
        }

        function saveApiKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if (key) {
                localStorage.setItem('google_ai_api_key', key);
                alert("金鑰儲存成功！現在可以開始使用 AI 調整功能了。");
                closeSettings();
            } else {
                alert("請輸入正確的金鑰。");
            }
        }

        function clearApiKey() {
            localStorage.removeItem('google_ai_api_key');
            document.getElementById('api-key-input').value = '';
            alert("金鑰已清除。");
        }

        // --- 題目路徑資料庫 ---
        const topicPaths = {
            timemachine: {
                name: "如果我有一臺時光機",
                themeColor: "purple",
                steps: [
                    { title: "第一步：你想去哪一個時間點？", key: "q1", items: [
                        { id: "回到恐龍時代", label: "恐龍時代", icon: "🦖", desc: "親眼看看巨大的霸王龍" },
                        { id: "去到未來世界", label: "未來世界", icon: "🚀", desc: "看看以後的房子是不是會飛" },
                        { id: "回到小時候", label: "我的小時候", icon: "👶", desc: "看看自己剛出生的可愛模樣" },
                        { id: "回到犯錯的那一天", label: "修正過去", icon: "⏪", desc: "回到忘記帶東西或吵架的那天" },
                        { id: "回到古代當大俠", label: "古代武俠", icon: "⚔️", desc: "去古代學習神奇的武功" },
                        { id: "去外星文明看外星人", label: "外星星球", icon: "👽", desc: "看看外星人的高科技生活" }
                    ]},
                    { title: "第二步：為什麼想去那個時候？", key: "q2", items: [
                        { id: "感到好奇", label: "滿足好奇心", icon: "🤔", desc: "世界有好多我不知道的秘密" },
                        { id: "彌補遺憾", label: "改寫錯誤", icon: "🩹", desc: "想把做錯的事情重新做對" },
                        { id: "非常想念某人", label: "想見見某人", icon: "🫂", desc: "想再見到已經不在身邊的人" },
                        { id: "尋找消失的寶藏", label: "尋找寶藏", icon: "💎", desc: "發掘埋藏在地下的古代秘密" },
                        { id: "了解歷史的真相", label: "歷史真相", icon: "📜", desc: "親身體驗書本上記載的事情" },
                        { id: "單純愛冒險", label: "想要冒險", icon: "🗺️", desc: "想體驗不一樣的生活樂趣" }
                    ]},
                    { title: "第三步：在那裡你想做什麼事？", key: "q3", items: [
                        { id: "拍下珍貴照片", label: "紀錄瞬間", icon: "📸", desc: "把最難得的畫面拍下來留念" },
                        { id: "提醒過去的我", label: "提點自己", icon: "📢", desc: "告訴過去的我要更努力、更勇敢" },
                        { id: "送出一份禮物", label: "傳遞溫暖", icon: "🎁", desc: "給過去或未來的親人一個驚喜" },
                        { id: "阻止爭吵發生", label: "守護和平", icon: "🤝", desc: "主動道歉讓大家重新和好" },
                        { id: "帶回未來的科技", label: "帶回新科技", icon: "💻", desc: "用未來的智慧解決現在的問題" },
                        { id: "阻止自然災害", label: "拯救地球", icon: "🌪️", desc: "在災害發生前預先發出警告" }
                    ]},
                    { title: "第四步：回到現在，我可以怎麼做？", key: "q4", items: [
                        { id: "珍惜當下時間", label: "珍惜時間", icon: "⌛", desc: "不浪費每一分每一秒" },
                        { id: "對身邊人更好", label: "愛身邊的人", icon: "💖", desc: "現在就去擁抱爸爸媽媽" },
                        { id: "記錄美好生活", label: "寫下日記", icon: "📓", desc: "讓現在的每一天都值得回憶" },
                        { id: "認真規劃時間", label: "規劃未來", icon: "📅", desc: "把每一天都安排得充實有意義" },
                        { id: "學習歷史知識", label: "多讀歷史", icon: "📖", desc: "從歷史中學習人生的道理" },
                        { id: "勇敢的面對現在", label: "保持勇敢", icon: "💪", desc: "就算沒有時光機也能解決困難" }
                    ]}
                ],
                templates: [(s) => `如果我有一臺時光機，我最想去的時間點是「${s.q1}」。\n\n我之所以想去那裡，是因為我對那段時光「${s.q2}」。在我的想像中，那是一個非常神奇的地方。\n\n抵達那裡後，我最想做的事情就是「${s.q3}」。對我來說，這不只是好玩，更是為了留下一些美好的回憶。\n\n雖然現實生活中並沒有真正的時光機，但我明白，每一分每一秒過去了就不能重來。所以，從現在開始，我決定要「${s.q4}」。我想，只要能珍惜現在，每一天都可以像冒險一樣精采！`]
            },
            superpower: {
                name: "我最想擁有的超能力",
                themeColor: "blue",
                steps: [
                    { title: "第一步：你想擁有哪種力量？", key: "q1", items: [
                        { id: "自由飛翔", label: "自由飛翔", icon: "🕊️", desc: "像鳥兒一樣穿梭在雲端" },
                        { id: "隱身術", label: "隱身術", icon: "👻", desc: "安靜地觀察，不被發現" },
                        { id: "動物語言", label: "動物語言", icon: "🐱", desc: "聽懂流浪貓狗的心聲" },
                        { id: "瞬間移動", label: "瞬間移動", icon: "🚪", desc: "一秒鐘到達想去的地方" },
                        { id: "變大變小", label: "伸縮能力", icon: "📏", desc: "可以像蟻人一樣自由變幻大小" },
                        { id: "過目不忘", label: "超級大腦", icon: "🧠", desc: "讀過的書一輩子都不會忘記" }
                    ]},
                    { title: "第二步：為什麼想要這個能力？", key: "q2", items: [
                        { id: "不再遲到", label: "不再遲到", icon: "⏰", desc: "解決每天趕時間的煩惱" },
                        { id: "想幫助寵物", label: "幫助寵物", icon: "🐶", desc: "想知道牠們為什麼不開心" },
                        { id: "減輕負擔", label: "減輕負擔", icon: "🎒", desc: "讓沉重的書包變輕盈" },
                        { id: "守護地球環境", label: "守護地球", icon: "🌱", desc: "想用力量讓世界環境變更好" },
                        { id: "解決懶惰問題", label: "提高效率", icon: "⚡", desc: "想把手邊的事情做得又快又好" },
                        { id: "探索秘密基地", label: "探索秘境", icon: "🏝️", desc: "去沒人去過的遠方冒險" }
                    ]},
                    { title: "第三步：你想用它做什麼好事？", key: "q3", items: [
                        { id: "拯救受困者", label: "拯救困難", icon: "🚑", desc: "在危急時刻勇敢保護大家" },
                        { id: "清理垃圾", label: "清理地球", icon: "♻️", desc: "讓森林和海洋變漂亮" },
                        { id: "陪伴孤單老人", label: "溫暖陪伴", icon: "👴", desc: "讓孤單的人感受到快樂" },
                        { id: "幫人找回失物", label: "尋找失物", icon: "🔍", desc: "幫同學找回弄丟的寶貝" },
                        { id: "修復壞掉的物品", label: "修復大師", icon: "🛠️", desc: "讓大家心愛的東西都能恢復原狀" },
                        { id: "荒地變森林", label: "綠色魔法", icon: "🌲", desc: "用能力在沙漠種出滿滿的樹木" }
                    ]},
                    { title: "第四步：現在的我如何努力？", key: "q4", items: [
                        { id: "鍛鍊強壯體魄", label: "鍛鍊身體", icon: "🏃", desc: "讓自己變得健康有力" },
                        { id: "充實大腦知識", label: "充實知識", icon: "📚", desc: "讀書學習，用智慧解決難題" },
                        { id: "學習助人為快樂", label: "熱心助人", icon: "❤️", desc: "就算沒法力也能愛人" },
                        { id: "認真做好每件事", label: "認真學習", icon: "✍️", desc: "練習專注，把每一件事都做好" },
                        { id: "練習勇敢表達", label: "練習表達", icon: "🗣️", desc: "把心裡的好想法勇敢說出來" },
                        { id: "發揮自己的特長", label: "發揮所長", icon: "🌟", desc: "找出最厲害的地方並好好發揮" }
                    ]}
                ],
                templates: [(s) => `我最想擁有的超能力是「${s.q1}」。\n\n如果我擁有這個能力，那該有多好！因為在生活中，我常常覺得「${s.q2}」這件事讓我很困擾，如果有超能力，我就可以輕鬆解決問題。\n\n我不僅想讓自己方便，更想用這份力量去幫助別人。例如，我想嘗試「${s.q3}」，看見別人臉上的笑容，我也會覺得非常有成就感。\n\n雖然我現在還沒有法力，但我相信，只要我願意「${s.q4}」，我也能成為一個優秀的人。我想，一顆願意助人的心，就是世界上最強大的超能力！`]
            }
        };

        // --- 功能邏輯 ---
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'zh-TW';
            recognition.onresult = (e) => {
                let text = Array.from(e.results).slice(e.resultIndex).map(r => r[0].transcript).join('');
                document.getElementById('my-speech-output').value = textBeforeCurrentRecording + text;
            };
        }

        function toggleRecording() {
            if (isRecording) {
                recognition.stop();
                isRecording = false;
                document.getElementById('mic-btn').classList.replace('bg-red-500', 'bg-purple-600');
                document.getElementById('recording-status').classList.add('hidden');
            } else {
                textBeforeCurrentRecording = document.getElementById('my-speech-output').value;
                recognition.start();
                isRecording = true;
                document.getElementById('mic-btn').classList.replace('bg-purple-600', 'bg-red-500');
                document.getElementById('recording-status').classList.remove('hidden');
            }
        }

        async function refineText() {
            const currentKey = getStoredApiKey();
            if (!currentKey) {
                alert("尚未設定 API Key！請點選右上方「齒輪按鈕」進行設定。");
                openSettings();
                return;
            }

            const input = document.getElementById('my-speech-output').value.trim();
            if (!input) return;

            setRefiningState(true);
            try {
                const prompt = `你是一位親切的國小寫作老師。學生的口說內容邏輯不通或是有贅字。請根據核心內容（題目：${topicPaths[currentTopic].name}），幫他調整。
                請生成 JSON 格式：{"v1": "溫馨感性風格的文章", "v2": "童趣生動且簡單易讀的文章"}。
                學生的內容是：${input}`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${currentKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }] }], 
                        generationConfig: { 
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    v1: { type: "STRING" },
                                    v2: { type: "STRING" }
                                }
                            }
                        } 
                    })
                });

                const data = await response.json();
                const json = JSON.parse(data.candidates[0].content.parts[0].text);
                currentAIRustResults = json;
                document.getElementById('ai-v1').innerText = json.v1;
                document.getElementById('ai-v2').innerText = json.v2;
                document.getElementById('ai-modal').classList.remove('hidden');
            } catch (err) {
                alert("調整失敗。請檢查 API Key 是否正確且具有 Gemini API 權限。");
            } finally {
                setRefiningState(false);
            }
        }

        function setRefiningState(loading) {
            const btn = document.getElementById('refine-btn');
            if (btn) {
                btn.disabled = loading;
                document.getElementById('refine-text').innerText = loading ? "調整中..." : "我來幫你調整";
                document.getElementById('refine-icon').classList.toggle('loading-spin', loading);
            }
        }

        function applyAI(v) {
            document.getElementById('my-speech-output').value = currentAIRustResults[v];
            closeAI();
        }

        function closeAI() { document.getElementById('ai-modal').classList.add('hidden'); }

        // --- 修正後的 UI 控制 ---
        function renderTopicSelector() {
            const selector = document.getElementById('topic-selector');
            if (!selector) return;
            selector.innerHTML = Object.keys(topicPaths).map(key => `
                <button onclick="switchTopic('${key}')" class="px-4 py-2 rounded-xl text-sm font-bold transition-all ${currentTopic === key ? 'bg-purple-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-50'}">
                    ${topicPaths[key].name}
                </button>
            `).join('');
        }

        function renderProgress() {
            const dots = document.getElementById('progress-dots');
            const bar = document.getElementById('progress-bar');
            if (!dots || !bar) return;
            let html = '<div class="absolute top-1/2 left-0 right-0 h-0.5 bg-slate-200 -translate-y-1/2 -z-10 mx-4"></div>';
            for (let i = 0; i <= 4; i++) {
                const cls = currentStep === i ? 'border-purple-600 text-purple-600 scale-110 shadow-lg' : (currentStep > i ? 'bg-green-500 border-green-500 text-white' : 'bg-white border-slate-300 text-slate-400');
                html += `<div class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold bg-white transition-all border-2 ${cls}">${currentStep > i ? '<i data-lucide="check" class="w-5 h-5"></i>' : i + 1}</div>`;
            }
            dots.innerHTML = html;
            bar.style.width = (currentStep / 4 * 100) + '%';
            lucide.createIcons();
        }

        function render() {
            renderTopicSelector();
            renderProgress();
            const card = document.getElementById('main-card');
            const path = topicPaths[currentTopic];
            if (currentStep < 4) {
                const step = path.steps[currentStep];
                card.innerHTML = `<div class="fade-in"><div class="flex items-center gap-3 mb-8"><div class="p-3 bg-purple-100 rounded-2xl text-purple-600"><i data-lucide="compass"></i></div><h2 class="text-2xl font-bold">${step.title}</h2></div><div class="grid grid-cols-1 md:grid-cols-3 gap-4">${step.items.map(item => `<button onclick="selectOption('${item.id}')" class="p-6 rounded-3xl border-2 text-left transition-all hover:border-purple-400 ${selections[step.key] === item.id ? 'border-purple-600 bg-purple-50 ring-4 ring-purple-50' : 'border-slate-100 bg-white'}"><div class="text-4xl mb-2">${item.icon}</div><div class="font-bold text-lg">${item.label}</div><div class="text-xs text-slate-500">${item.desc}</div></button>`).join('')}</div></div>`;
            } else {
                document.getElementById('progress-container').classList.add('hidden');
                card.innerHTML = `<div class="fade-in flex flex-col h-full"><div class="flex justify-between mb-8 pb-4 border-b"><div><h2 class="text-2xl font-bold">作文藍圖已完成</h2><p class="text-slate-400">點選右側麥克風開始錄音或修改。</p></div><div class="flex gap-2"><button onclick="printResult()" class="px-4 py-2 bg-green-600 text-white rounded-xl font-bold shadow-md"><i data-lucide="printer"></i> 列印</button><button onclick="resetApp()" class="px-4 py-2 text-slate-400 font-bold">重新開始</button></div></div><div class="grid grid-cols-1 lg:grid-cols-2 gap-8 flex-grow"><div class="bg-indigo-50 border-2 border-indigo-100 rounded-[2rem] p-6"><pre class="whitespace-pre-wrap font-serif text-lg text-slate-700">${path.templates[0](selections)}</pre></div><div class="relative bg-purple-50 border-2 border-purple-100 rounded-[2rem] p-6 flex flex-col"><textarea id="my-speech-output" placeholder="點選下方麥克風說話..." class="w-full h-full bg-transparent border-none focus:ring-0 text-lg font-serif"></textarea><div id="recording-status" class="hidden absolute top-4 right-4 text-xs text-red-500 font-bold animate-pulse">錄音中...</div><div class="absolute bottom-4 right-4 flex gap-2"><button id="refine-btn" onclick="refineText()" class="px-4 py-3 bg-white border-2 border-purple-200 text-purple-600 rounded-2xl font-bold flex items-center gap-2"><i data-lucide="wand-2" id="refine-icon"></i><span id="refine-text">我來幫你調整</span></button><button id="mic-btn" onclick="toggleRecording()" class="w-16 h-16 bg-purple-600 text-white rounded-full flex items-center justify-center shadow-lg"><i data-lucide="mic"></i></button></div></div></div></div>`;
            }
            lucide.createIcons();
        }

        function selectOption(id) { selections[topicPaths[currentTopic].steps[currentStep].key] = id; if (currentStep < 4) currentStep++; render(); }
        function switchTopic(k) { currentTopic = k; resetApp(); }
        function resetApp() { currentStep = 0; selections = { q1:'', q2:'', q3:'', q4:'' }; render(); document.getElementById('progress-container').classList.remove('hidden'); }
        function printResult() { document.getElementById('print-area').innerText = document.getElementById('my-speech-output').value; window.print(); }

        window.onload = render;
    </script>
</body>
</html>
